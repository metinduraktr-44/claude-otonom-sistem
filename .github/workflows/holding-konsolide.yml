name: holding-konsolide
# Günlük holding portföy raporu (API modu için GITHUB_TOKEN yeterli — kendi repolarını okur).
on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 10:00 Istanbul
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  konsolide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Holding konsolide rapor
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/holding_report.py
      - name: Commit
        run: |
          git config user.name "otonom-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "holding-konsolide: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "değişiklik yok"
          git push || echo "push atlandı"
