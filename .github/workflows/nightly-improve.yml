name: nightly-improve
on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 03:00 Istanbul, every night
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Run nightly loop (read -> distill -> produce -> validate -> stamp)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/nightly.sh
      - name: Commit changes
        run: |
          git config user.name "adops-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "nightly: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "no changes"
          git push || echo "push skipped"
